name: Build Ghostgram IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Setup Configuration
        run: |
          cp Telegram/Config/config.json.example Telegram/Config/config.json
          # Note: This uses default/example keys. For full functionality, 
          # you'd replace these with your own from my.telegram.org.

      - name: Generate Xcode Project
        run: |
          python3 build-system/Make/Make.py \
            --project Telegram \
            --configuration release \
            --buildNumber 1 \
            --bundleVersion 1.0 \
            --developerTeam "TEAMID123" \
            --bundleId "com.serhiibd.ghostgram" \
            generateProject

      - name: Build App
        run: |
          xcodebuild -project Telegram.xcodeproj \
            -scheme Telegram \
            -configuration Release \
            -sdk iphoneos \
            build CODE_SIGNING_ALLOWED=NO

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/Telegram.app Payload/
          zip -r Ghostgram.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram-Unsigned-IPA
          path: Ghostgram.ipa
