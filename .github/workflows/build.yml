name: Build Ghostgram IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ichmagmaus111/ghostgram
          fetch-depth: 0
          # We don't do submodules here yet because they are broken

      - name: Fix Broken Submodule Links
        run: |
          # Replace the broken ichmagmaus111 links with official Telegram ones
          sed -i '' 's|https://github.com/ichmagmaus111/tgcalls.git|https://github.com/TelegramMessenger/tgcalls.git|g' .gitmodules
          sed -i '' 's|https://github.com/ichmagmaus111/rlottie.git|https://github.com/TelegramMessenger/rlottie.git|g' .gitmodules
          
          # Initialize submodules with the new links
          git submodule update --init --recursive

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Setup Configuration
        run: |
          cp Telegram/Config/config.json.example Telegram/Config/config.json

      - name: Generate Xcode Project
        run: |
          python3 build-system/Make/Make.py \
            --project Telegram \
            --configuration release \
            --buildNumber 1 \
            --bundleVersion 1.0 \
            --developerTeam "TEAMID123" \
            --bundleId "com.build.ghostgram" \
            generateProject

      - name: Build App
        run: |
          xcodebuild -project Telegram.xcodeproj \
            -scheme Telegram \
            -configuration Release \
            -sdk iphoneos \
            build CODE_SIGNING_ALLOWED=NO

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/Telegram.app Payload/
          zip -r Ghostgram.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram-Unsigned-IPA
          path: Ghostgram.ipa
