name: Build Ghostgram IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ichmagmaus111/ghostgram
          fetch-depth: 0
          lfs: true # Downloads large files (images/graphics)

      - name: Fix Submodules and Clone
        run: |
          # Swap broken links to official Telegram ones
          sed -i '' 's|https://github.com/ichmagmaus111/tgcalls.git|https://github.com/TelegramMessenger/tgcalls.git|g' .gitmodules
          sed -i '' 's|https://github.com/ichmagmaus111/rlottie.git|https://github.com/TelegramMessenger/rlottie.git|g' .gitmodules
          
          # Force update submodules
          git submodule sync
          git submodule update --init --recursive --force

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Setup Configuration
        run: |
          # Creating a dummy config so the build doesn't crash
          if [ ! -f Telegram/Config/config.json ]; then
            cp Telegram/Config/config.json.example Telegram/Config/config.json
          fi

      - name: Generate Project
        run: |
          python3 build-system/Make/Make.py \
            --project Telegram \
            --configuration release \
            --buildNumber 1 \
            --bundleVersion 1.0 \
            --developerTeam "TEAMID123" \
            --bundleId "com.build.ghostgram" \
            generateProject

      - name: Build App (This takes a long time)
        run: |
          xcodebuild -project Telegram.xcodeproj \
            -scheme Telegram \
            -configuration Release \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            build CODE_SIGNING_ALLOWED=NO

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # Find the app file and copy it
          APP_PATH=$(find . -name "Telegram.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r Ghostgram.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram-Unsigned-IPA
          path: Ghostgram.ipa
