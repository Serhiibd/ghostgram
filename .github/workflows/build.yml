name: Build Ghostgram IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ichmagmaus111/ghostgram
          fetch-depth: 0
          lfs: true

      - name: Fix Submodules
        run: |
          sed -i '' 's|https://github.com/ichmagmaus111/tgcalls.git|https://github.com/TelegramMessenger/tgcalls.git|g' .gitmodules
          sed -i '' 's|https://github.com/ichmagmaus111/rlottie.git|https://github.com/TelegramMessenger/rlottie.git|g' .gitmodules
          git submodule sync
          git submodule update --init --recursive --force

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Setup Config
        run: |
          mkdir -p Telegram/Config
          cp Telegram/Config/config.json.example Telegram/Config/config.json || echo "{}" > Telegram/Config/config.json

      - name: Generate Project
        run: |
          python3 build-system/Make/Make.py \
            --project Telegram \
            --configuration release \
            --buildNumber 1 \
            --bundleVersion 1.0 \
            --developerTeam "TEAMID123" \
            --bundleId "com.build.ghostgram" \
            generateProject

      - name: Build App
        run: |
          # Adding 'ARCHS=arm64' to ensure it builds for iPhone
          xcodebuild -project Telegram.xcodeproj \
            -scheme Telegram \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            clean build

      - name: Create IPA
        run: |
          mkdir -p Payload
          # This command finds the actual .app file even if the folder structure changes
          APP_DIR=$(find . -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          cp -r "$APP_DIR" Payload/
          zip -r Ghostgram.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram-IPA
          path: Ghostgram.ipa
