name: Build Ghostgram IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ichmagmaus111/ghostgram
          fetch-depth: 1 # Faster download
          lfs: true

      - name: Force Fix Submodules
        run: |
          # 1. Initialize submodules without cloning them yet
          git submodule init
          
          # 2. Manually override the broken URLs in the git config
          git config submodule."submodules/TgVoipWebrtc/tgcalls".url "https://github.com/TelegramMessenger/tgcalls.git"
          git config submodule."submodules/rlottie/rlottie".url "https://github.com/TelegramMessenger/rlottie.git"
          
          # 3. Sync the new URLs to the internal git state
          git submodule sync
          
          # 4. Now update and clone (this should now pull from TelegramMessenger)
          git submodule update --init --recursive --force --depth 1

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Setup Config
        run: |
          mkdir -p Telegram/Config
          cp Telegram/Config/config.json.example Telegram/Config/config.json || echo "{}" > Telegram/Config/config.json

      - name: Generate Project
        run: |
          python3 build-system/Make/Make.py \
            --project Telegram \
            --configuration release \
            --buildNumber 1 \
            --bundleVersion 1.0 \
            --developerTeam "TEAMID123" \
            --bundleId "com.build.ghostgram" \
            generateProject

      - name: Build App
        run: |
          xcodebuild -project Telegram.xcodeproj \
            -scheme Telegram \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            clean build

      - name: Create IPA
        run: |
          mkdir -p Payload
          # Find the built .app folder
          APP_DIR=$(find . -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          if [ -z "$APP_DIR" ]; then echo "App directory not found!"; exit 1; fi
          cp -r "$APP_DIR" Payload/
          zip -r Ghostgram.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghostgram-IPA
          path: Ghostgram.ipa
